<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Contact Wild Petal Collective" />
  <title>Wild Petal Collective | Contact</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="theme-light" data-page="contact">
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">Wild Petal Collective</a>
      <nav aria-label="Primary">
        <ul class="nav-list">
          <li><a href="index.html">Home</a></li>
          <li><a href="design.html">Design</a></li>
          <li><a href="talismans.html">Talismans</a></li>
          <li><a href="about.html">About</a></li>
          <li><a class="is-active" href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container narrow">
        <p class="eyebrow">Contact</p>
        <h1>Get in touch</h1>
        <form class="waitlist-form" action="#" method="post">
          <label for="contact-email">Email Address</label>
          <input id="contact-email" name="email" type="email" autocomplete="email" required placeholder="you@example.com" />

          <label for="contact-question">Your Question</label>
          <textarea id="contact-question" name="question" rows="4" required placeholder="Ask a short question..."></textarea>

          <button class="btn btn-gold" type="submit">Send</button>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
